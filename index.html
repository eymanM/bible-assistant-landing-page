<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scripture Assistant</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://scriptureassistant.com/">
  <script>
    (function () {
      const langs = navigator.languages || [navigator.language || "en"];
      const isPolish = langs.some(lang => lang.toLowerCase().startsWith("pl"));
      window.location.replace(isPolish ? "/pl/" : "/en/");
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/en/">
  </noscript>
</head>
<body></body>
</html>
